name: balance_ai
version: 0.1.0+1
publish_to: 'none'
description: Flutter implementation of the Balance AI life-balance app with MiniMax M2.7 recommendations and voice-first assessment.

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.0.0
  go_router: ^16.0.0
  http: ^1.2.2
  shared_preferences: ^2.3.2
  speech_to_text: ^7.0.0
  flutter_secure_storage: ^9.2.2
  intl: ^0.20.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  test: ^1.25.8

flutter:
  uses-material-design: true
  assets:
    - assets/images/balance_ai_hero_banner.png
    - docs/reference/life_balance_contact_sheet.png
    - docs/reference/DESIGN.md
